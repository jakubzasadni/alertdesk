apiVersion: v1
kind: Secret
metadata:
  name: {{ include "alertdesk.fullname" . }}
  labels: {{- include "alertdesk.labels" . | nindent 4 }}
type: Opaque
stringData:
  SECRET_KEY: {{ .Values.secret.secretKey | quote }}
  DATABASE_URL: {{ include "alertdesk.databaseUrl" . | quote }}
  CALDAV_PASSWORD: {{ .Values.secret.caldavPassword | quote }}

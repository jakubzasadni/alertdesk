apiVersion: v1
kind: Service
metadata:
  name: {{ include "alertdesk.fullname" . }}-backend
  labels: {{- include "alertdesk.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: {{ .Values.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "alertdesk.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: backend
  ports:
    - port: {{ .Values.service.backendPort }}
      targetPort: 8000

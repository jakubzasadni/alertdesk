services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: alertdesk
      POSTGRES_USER: alertdesk
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://alertdesk:devpassword@postgres:5432/alertdesk
      ALERTMANAGER_URL: http://host.docker.internal:9093
      SECRET_KEY: dev-secret-key-change-me-in-prod-32c
      SYNC_INTERVAL_SECONDS: "30"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
